repos:
  # Lint & format
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        types_or: [python, pyi, jupyter]
        args: [--fix]
      - id: ruff-format
        types_or: [python, pyi, jupyter]

  - repo: local
    hooks:
      - id: check-mxlmodels-imports
        name: check-mxlmodels-imports
        files: ^src/mxlmodels/.*\.py$
        stages: [pre-commit]
        language: system
        pass_filenames: false
        entry: uv run python scripts/check_if_imported.py src/mxlmodels

      - id: format-python-docstrings
        name: format-python-docstrings
        files: \.py$
        stages: [pre-commit]
        language: system
        entry: uv run python scripts/format_docstrings.py

      - id: jupyter-nb-clear-output
        name: jupyter-nb-clear-output
        files: \.ipynb$
        stages: [pre-commit]
        language: system
        entry: uvx jupyter nbconvert --ClearOutputPreprocessor.enabled=True --inplace
